<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>佳凌型態操作判斷工具</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
    h2 { color: #333; }
    label { display: block; margin-top: 10px; }
    input { padding: 5px; width: 150px; }
    button { margin-top: 15px; padding: 8px 15px; background: #0078d7; color: #fff; border: none; cursor: pointer; }
    button:hover { background: #005a9e; }
    .result { margin-top: 20px; font-weight: bold; color: #444; }
  </style>
</head>
<body>
  <h2>佳凌型態操作判斷工具</h2>
  <label>輸入股價：</label>
  <input type="number" id="price" step="0.1">
  <label>輸入成交量（張）：</label>
  <input type="number" id="volume">
  <button onclick="analyze()">判斷型態</button>

  <div class="result" id="result"></div>

  <script>
    function analyze() {
      const price = parseFloat(document.getElementById("price").value);
      const volume = parseInt(document.getElementById("volume").value);
      let result = "";

      if (price < 28 && volume > 1000) {
        result = "空方延伸型態：不宜進場，觀望。";
      } else if (price >= 32.9 && volume > 1500) {
        result = "突破型態：可短線進場，設停損32元。";
      } else if (price >= 30 && price <= 31 && volume < 800) {
        result = "震盪整理型態：觀望，等待方向明朗。";
      } else if (price >= 28.5 && price <= 29 && volume < 600) {
        result = "多方防守型態：可小量試單，守28元停損。";
      } else if (price > 29 && price < 30 && volume < 700) {
        result = "反彈型態：回測支撐不破，可進場，突破30元放量可加碼。";
      } else {
        result = "尚未形成明確型態，請持續觀察。";
      }

      document.getElementById("result").innerText = result;
    }
  </script>
</body>
</html>
